services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password  # local dev only — override via env for CI/staging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "bundle exec rails db:create db:migrate db:seed &&
               bundle exec rails server -p 3000 -b 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres/api_comparison_development
      DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  grpc:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bundle exec ruby lib/grpc_server.rb
    ports:
      - "50051:50051"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres/api_comparison_development
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
